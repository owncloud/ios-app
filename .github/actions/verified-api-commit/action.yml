name: 'Verified API Commit'
description: 'Commits specifically changed files and folders via the GitHub API to generate a Verified signature.'
author: 'Your Name'

inputs:
  files:
    description: 'A multiline list of files and/or folders to check and commit'
    required: true
  commit-message:
    description: 'The commit message to use'
    required: true
  github-token:
    description: 'The GITHUB_TOKEN to use for the API call'
    required: true
    default: ${{ github.token }}
  retry-on-conflict:
    description: 'If true, fetches and rebases remote changes automatically if another workflow pushes concurrently.'
    required: false
    default: 'false'
  max-retries:
    description: 'Maximum number of retries if retry-on-conflict is true.'
    required: false
    default: '3'

runs:
  using: 'composite'
  steps:
    - name: Commit specifically changed files
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        FILES_INPUT: ${{ inputs.files }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        RETRY_ON_CONFLICT: ${{ inputs.retry-on-conflict }}
        MAX_RETRIES: ${{ inputs.max-retries }}
      run: |
        # Configure max attempts based on the input
        if [[ "$RETRY_ON_CONFLICT" != "true" ]]; then
          MAX_RETRIES=1
        fi
        
        RETRY_COUNT=0
        SUCCESS=false

        # Set up git config locally to prevent rebase warnings if retrying is enabled
        if [[ "$RETRY_ON_CONFLICT" == "true" ]]; then
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        fi

        while [[ $RETRY_COUNT -lt $MAX_RETRIES ]]; do
          ADDITIONS_JSON="[]"
          declare -a PROCESSED_FILES=()
          
          # 1. Loop through the multiline input securely (supports files and folders)
          while IFS= read -r ITEM || [[ -n "$ITEM" ]]; do
            # Skip empty lines
            if [[ -z "$ITEM" ]]; then continue; fi
            
            # 2. Check if Git sees modifications for this specific file or folder
            # Passing a folder to git status returns all changed files inside it
            while IFS= read -r STATUS_LINE || [[ -n "$STATUS_LINE" ]]; do
              if [[ -z "$STATUS_LINE" ]]; then continue; fi
              
              # Extract the file path from porcelain output (removes the "M  " prefix)
              # If it was renamed ("R  old -> new"), keep only the new path
              FILE_PATH=$(echo "$STATUS_LINE" | cut -c4- | sed -e 's/.* -> //')
              
              # Remove surrounding quotes if Git added them (for paths with spaces)
              FILE_PATH="${FILE_PATH%\"}"
              FILE_PATH="${FILE_PATH#\"}"

              # Ensure the path is actually a file (this skips deleted files or directories)
              if [[ -f "$FILE_PATH" ]]; then
                
                # Check for duplicates in case inputs overlap (e.g., "doc/" and "doc/config.json")
                IS_DUPLICATE=false
                for PROCESSED in "${PROCESSED_FILES[@]}"; do
                  if [[ "$PROCESSED" == "$FILE_PATH" ]]; then
                    IS_DUPLICATE=true
                    break
                  fi
                done
                
                if [[ "$IS_DUPLICATE" == true ]]; then continue; fi
                PROCESSED_FILES+=("$FILE_PATH")

                echo "Detected changes in: $FILE_PATH"
                
                # Base64 encode without line wrapping (OS-Specific arguments)
                if [[ "$RUNNER_OS" == "macOS" ]]; then
                  # macOS (BSD) requires -i for input and -b 0 to disable line breaks
                  B64_CONTENT=$(base64 -b 0 -i "$FILE_PATH")
                else
                  # Linux (GNU) requires -w 0 to disable line breaks and accepts the file directly
                  B64_CONTENT=$(base64 -w 0 "$FILE_PATH")
                fi
                
                # Use jq to safely append the object to our JSON array
                ADDITIONS_JSON=$(echo "$ADDITIONS_JSON" | jq --arg path "$FILE_PATH" --arg contents "$B64_CONTENT" '. + [{path: $path, contents: $contents}]')
              else
                echo "Warning: $FILE_PATH is not a file or was deleted. Skipping addition."
              fi
            done <<< "$(git status --porcelain "$ITEM" 2>/dev/null)"
          done <<< "$FILES_INPUT"

          # 3. If the array is still empty, no files from the list changed
          if [[ "$ADDITIONS_JSON" == "[]" ]]; then
            echo "None of the specified files or folders changed. Skipping commit."
            exit 0
          fi

          # 4. Prepare the GraphQL Payload using jq
          # Use the API to get the absolute latest remote OID to prevent race conditions
          HEAD_OID=$(gh api repos/$GITHUB_REPOSITORY/git/ref/heads/${GITHUB_HEAD_REF:-$GITHUB_REF_NAME} --jq '.object.sha')
          
          QUERY='mutation CreateCommitOnBranch($repo: String!, $branch: String!, $oid: GitObjectID!, $msg: String!, $files: [FileAddition!]!) {
            createCommitOnBranch(input: {
              branch: { repositoryNameWithOwner: $repo, branchName: $branch },
              message: { headline: $msg },
              fileChanges: { additions: $files },
              expectedHeadOid: $oid
            }) { commit { url } }
          }'

          # Build the full GraphQL JSON payload and pipe it directly to gh api
          # Capture output to check for concurrency errors
          RESPONSE=$(jq -n \
            --arg query "$QUERY" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" \
            --arg oid "$HEAD_OID" \
            --arg msg "$COMMIT_MESSAGE" \
            --argjson files "$ADDITIONS_JSON" \
            '{
              query: $query,
              variables: {
                repo: $repo,
                branch: $branch,
                oid: $oid,
                msg: $msg,
                files: $files
              }
            }' | gh api graphql --input - 2>&1)
          
          # 5. Handle Concurrency Mismatch
          if echo "$RESPONSE" | grep -q "expectedHeadOid"; then
            if [[ "$RETRY_ON_CONFLICT" == "true" && $((RETRY_COUNT+1)) -lt $MAX_RETRIES ]]; then
              echo "⚠️ OID Mismatch detected (another workflow pushed concurrently). Retrying... ($((RETRY_COUNT+1))/$MAX_RETRIES)"
              
              # Stash our local changes, pull the newest commit from remote, and pop our changes back on top
              git stash push --keep-index --include-untracked
              git fetch origin "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
              git rebase FETCH_HEAD
              git stash pop || true # Ignore pop errors if the stash was empty
              
              sleep 5
              RETRY_COUNT=$((RETRY_COUNT+1))
            else
              echo "❌ Failed to push commit. Concurrency conflict (OID Mismatch)."
              echo "Last API Response: $RESPONSE"
              exit 1
            fi
          elif echo "$RESPONSE" | grep -q "errors"; then
            echo "❌ GraphQL API Error:"
            echo "$RESPONSE"
            exit 1
          else
            echo "✅ Successfully created verified commit!"
            SUCCESS=true
            break
          fi
        done

# ==============================================================================
# DOCUMENTATION & USAGE EXAMPLES
# ==============================================================================
#
# Overview:
# This action bypasses the standard Git CLI to push commits directly via the
# GitHub GraphQL API. Doing so ensures the commit receives a "Verified" badge
# natively attributed to the `github-actions[bot]` without requiring GPG keys.
# It automatically skips committing if no files were modified.
#
# Requirements:
# The calling job must have `contents: write` permissions enabled so the
# GITHUB_TOKEN is authorized to mutate repository files.
#
# Example Usage:
#
# name: Format and Commit
# on: [push, pull_request]
