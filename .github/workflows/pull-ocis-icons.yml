name: "Pull icons from ocis/web"

# Queue this workflow so it only runs one at a time for this specific branch,
# avoiding race conditions when commiting changes
concurrency:
  group: push-queue-${{ github.ref }}
  cancel-in-progress: false # Wait in line instead of cancelling

# This workflow is triggered on pushes to the repository.
on:
  workflow_dispatch:
  push:
    branches:
      - "release/*"
permissions:
  contents: write

jobs:
  pull-icons:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true  

      - name: Build MakeTVG
        run: |
          swift -v
          swiftc tools/MakeTVG/main.swift -o /tmp/MakeTVG

      - name: Clone ocis and web repos
        run: |
          git clone "https://github.com/owncloud/ocis/" /tmp/ocis-git
          git clone "https://github.com/owncloud/web/" /tmp/web-git

      - name: Run MakeTVG
        run: |
          /tmp/MakeTVG \
             --makefile img/make.json \
             --icon-ts /tmp/web-git/packages/web-pkg/src/helpers/resource/icon.ts \
             --web-theme /tmp/ocis-git/services/web/assets/themes/owncloud/theme.json \
             --color-yaml /tmp/web-git/packages/design-system/src/tokens/ods/color.yaml \
             --legacy-input img/icons \
             --input /tmp/web-git/packages/design-system/src/assets/icons \
             --file-filter only-matches \
             --icon-map img/tvg-icons/icon-map.json \
             --output img/tvg-icons

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.TRANSLATION_APP_ID }}
          private-key: ${{ secrets.TRANSLATION_APP_PRIVATE_KEY }}
      - name: Commit and sign modified files via API
        uses: ./.github/actions/verified-api-commit
        with:
          commit-message: "[icons] updated icons from ocis and ocis web"
          retry-on-conflict: 'true'
          files: |
            img/tvg-icons/
