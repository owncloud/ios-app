name: Update Configuration Documentation

# Queue this workflow so it only runs one at a time for this specific branch,
# avoiding race conditions when commiting changes
concurrency:
  group: push-queue-${{ github.ref }}
  cancel-in-progress: false # Wait in line instead of cancelling

# This workflow is triggered on pushes to the repository.
on:
  push:
    branches:
    - fix/*
    - feature/*
    - release/*

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write # Required for the API to write commits
    name: Update Configuration Documentation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: true  
#     - name: Select Xcode
#       run: sudo xcode-select -switch /Applications/Xcode_14.3.app
      - name: Xcode version
        run: /usr/bin/xcodebuild -version
      - name: Install gomplate
        run: brew install gomplate
      - name: Run Generate Docs
        run: ./generate_docs.sh
        working-directory: ./tools/GenerateDocs/
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.TRANSLATION_APP_ID }}
          private-key: ${{ secrets.TRANSLATION_APP_PRIVATE_KEY }}
      - name: Commit and sign modified files via API
        uses: ./.github/actions/verified-api-commit
        with:
          commit-message: "Configuration documentation updated"
          retry-on-conflict: 'true'
          files: |
            doc/CONFIGURATION.json
            doc/configuration.adoc
