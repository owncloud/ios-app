name: Update Configuration Documentation
# This workflow is triggered on pushes to the repository.
on:
  push:
    branches:
    - fix/*
    - feature/*
    - milestone/*

jobs:
  build:
    runs-on: macos-26
    name: Update Configuration Documentation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (previously v4)
        with:
          submodules: true
#     - name: Select Xcode
#       run: sudo xcode-select -switch /Applications/Xcode_14.3.app
      - name: Xcode version
        run: /usr/bin/xcodebuild -version
      - name: Install gomplate
        run: brew install gomplate
      - name: Run Generate Docs
        run: ./generate_docs.sh
        working-directory: ./tools/GenerateDocs/
      - uses: GuillaumeFalourd/git-commit-push@205c043bca2f932f7a48a28a8d619ba30eb84baf # v1.3
        with:
          email: devops@owncloud.com
          name: ownClouders
          commit_message: "Configuration documentation updated"
          files: doc/CONFIGURATION.json doc/configuration.adoc
